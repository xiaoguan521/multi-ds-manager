apiVersion: v1
kind: Secret
metadata:
  name: multi-ds-manager-secrets
type: Opaque
stringData:
  BOOTSTRAP_AUTH_TOKEN: "replace-me"
  KINGBASE_URL: "postgres://user:password@kingbase-host:54321/database"
  ORACLE_URL: "oracle://user:password@oracle-host:1521/ORCL"
  DM_URL: "dm://user:password@dm-host:5236/DEMO"
  GRPC_TLS_ENABLED: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: multi-ds-manager-grpc-tls
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_ME
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_ME
    -----END PRIVATE KEY-----
