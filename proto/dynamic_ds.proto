syntax = "proto3";

package multi_ds.grpc.v1;

import "google/protobuf/struct.proto";

option java_multiple_files = true;
option java_package = "com.example.multids.grpc.v1";
option java_outer_classname = "DynamicDsProto";

service DynamicDataSource {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
}

enum OperationType {
  UNSPECIFIED = 0;
  QUERY = 1;
  EXECUTE = 2;
  PROCEDURE = 3;
}

message PingRequest {}

message PingResponse {
  string message = 1;
  string version = 2;
  uint32 datasource_count = 3;
}

message ExecuteRequest {
  string jgbh = 1;
  OperationType operation_type = 2;
  string sql = 3;
  string procedure_name = 4;
  repeated google.protobuf.Value params = 5;
  uint64 timeout_ms = 6;
  string request_id = 7;
  string operator = 8;
  string caller_id = 9;
  string auth_token = 10;
  uint32 max_rows = 11;
}

message ExecuteResponse {
  bool success = 1;
  string jgbh = 2;
  string datasource_name = 3;
  string datasource_type = 4;
  OperationType operation_type = 5;
  string backend = 6;
  string statement = 7;
  repeated google.protobuf.Struct rows = 8;
  uint64 affected_rows = 9;
  repeated google.protobuf.Value out_params = 10;
  uint64 elapsed_ms = 11;
}
