name: docker-image

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.vars.outputs.image }}
      push: ${{ steps.vars.outputs.push }}
      primary_tag: ${{ steps.vars.outputs.primary_tag }}
      tags: ${{ steps.vars.outputs.tags }}
      release_notes_tags: ${{ steps.vars.outputs.release_notes_tags }}
    steps:
      - name: Compute Image Metadata
        id: vars
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::12}"

          slugify() {
            echo "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//'
          }

          push_image="true"
          tags=()

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            push_image="false"
            tags+=("pr-${PR_NUMBER}")
            tags+=("sha-${short_sha}")
          elif [[ "$REF_TYPE" == "tag" ]]; then
            release_tag="$(slugify "$REF_NAME")"
            tags+=("$release_tag")
            tags+=("sha-${short_sha}")
            if [[ "$release_tag" == v* && "${release_tag#v}" != "$release_tag" ]]; then
              tags+=("${release_tag#v}")
            fi
          else
            branch_tag="$(slugify "$REF_NAME")"
            tags+=("$branch_tag")
            tags+=("sha-${short_sha}")
            if [[ "$REF_NAME" == "$DEFAULT_BRANCH" ]]; then
              tags+=("latest")
            fi
          fi

          unique_tags=()
          for tag in "${tags[@]}"; do
            if [[ -z "$tag" ]]; then
              continue
            fi

            exists="false"
            for item in "${unique_tags[@]}"; do
              if [[ "$item" == "$tag" ]]; then
                exists="true"
                break
              fi
            done

            if [[ "$exists" == "false" ]]; then
              unique_tags+=("$tag")
            fi
          done

          {
            echo "image=$image"
            echo "push=$push_image"
            echo "primary_tag=${unique_tags[0]}"
            echo "tags<<EOF"
            printf '%s\n' "${unique_tags[@]}"
            echo "EOF"
            echo "release_notes_tags<<EOF"
            printf '%s\n' "${unique_tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write Job Summary
        shell: bash
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
          IMAGE_TAGS: ${{ steps.vars.outputs.tags }}
          PUSH_IMAGE: ${{ steps.vars.outputs.push }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          {
            echo "## Docker Image Plan"
            echo
            echo "- Image: \`${IMAGE}\`"
            echo "- Ref: \`${REF_TYPE}:${REF_NAME}\`"
            echo "- Push enabled: \`${PUSH_IMAGE}\`"
            echo "- Latest tag eligible: \`$([[ "$REF_TYPE" == "branch" && "$REF_NAME" == "$DEFAULT_BRANCH" ]] && echo yes || echo no)\`"
            echo
            echo "### Planned Tags"
            printf '%s\n' "$IMAGE_TAGS" | sed 's/^/- `/' | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log In To GHCR
        if: needs.prepare.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        shell: bash
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          IMAGE_TAGS: ${{ needs.prepare.outputs.tags }}
          PRIMARY_TAG: ${{ needs.prepare.outputs.primary_tag }}
          ARCH: ${{ matrix.arch }}
          PUSH_IMAGE: ${{ needs.prepare.outputs.push }}
        run: |
          set -euo pipefail

          mapfile -t base_tags < <(printf '%s\n' "$IMAGE_TAGS")
          arch_tags=()
          for tag in "${base_tags[@]}"; do
            if [[ -n "$tag" ]]; then
              arch_tags+=("${IMAGE}:${tag}-${ARCH}")
            fi
          done

          if [[ ${#arch_tags[@]} -eq 0 ]]; then
            echo "No image tags were generated."
            exit 1
          fi

          docker build --pull \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${PRIMARY_TAG}" \
            -t "${arch_tags[0]}" \
            .

          for tag in "${arch_tags[@]:1}"; do
            docker tag "${arch_tags[0]}" "$tag"
          done

          docker run --rm "${arch_tags[0]}" --help > /dev/null

          if [[ "$PUSH_IMAGE" == "true" ]]; then
            for tag in "${arch_tags[@]}"; do
              docker push "$tag"
            done
          fi

          {
            echo "## Native Build (${ARCH})"
            echo
            echo "- Runner architecture: \`${ARCH}\`"
            echo "- Verification: \`docker run --rm ${arch_tags[0]} --help\`"
            echo
            echo "### Architecture Tags"
            printf '%s\n' "${arch_tags[@]}" | sed 's/^/- `/' | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"

  publish-manifest:
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.push == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Multi-Arch Manifest
        id: manifest
        shell: bash
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled
          IMAGE: ${{ needs.prepare.outputs.image }}
          IMAGE_TAGS: ${{ needs.prepare.outputs.tags }}
        run: |
          set -euo pipefail

          mapfile -t base_tags < <(printf '%s\n' "$IMAGE_TAGS")
          published_tags=()

          for tag in "${base_tags[@]}"; do
            if [[ -z "$tag" ]]; then
              continue
            fi

            final_tag="${IMAGE}:${tag}"
            amd64_tag="${IMAGE}:${tag}-amd64"
            arm64_tag="${IMAGE}:${tag}-arm64"

            docker manifest rm "$final_tag" > /dev/null 2>&1 || true
            docker manifest create "$final_tag" "$amd64_tag" "$arm64_tag"
            docker manifest annotate "$final_tag" "$amd64_tag" --arch amd64
            docker manifest annotate "$final_tag" "$arm64_tag" --arch arm64
            docker manifest push "$final_tag"
            docker manifest inspect "$final_tag" > /dev/null
            published_tags+=("$final_tag")
          done

          {
            echo "published_tags<<EOF"
            printf '%s\n' "${published_tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Published Multi-Arch Tags"
            echo
            printf '%s\n' "${published_tags[@]}" | sed 's/^/- `/' | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"

  release-note:
    needs:
      - prepare
      - publish-manifest
    if: needs.prepare.outputs.push == 'true' && github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read
    steps:
      - name: Create Or Update Release Image References
        uses: actions/github-script@v7
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          IMAGE_TAGS: ${{ needs.prepare.outputs.release_notes_tags }}
          REF_NAME: ${{ github.ref_name }}
        with:
          script: |
            const image = process.env.IMAGE;
            const tagName = process.env.REF_NAME;
            const tags = (process.env.IMAGE_TAGS || "")
              .split("\n")
              .map((item) => item.trim())
              .filter(Boolean);

            const startMarker = "<!-- multi-ds-manager-image-refs:start -->";
            const endMarker = "<!-- multi-ds-manager-image-refs:end -->";
            const lines = [
              startMarker,
              "## Container Images",
              "",
              "Multi-arch image tags published for this release:",
              "",
              ...tags.map((tag) => `- \`${image}:${tag}\``),
              "",
              "Architecture-specific staging tags:",
              "",
              ...tags.flatMap((tag) => [
                `- \`${image}:${tag}-amd64\``,
                `- \`${image}:${tag}-arm64\``,
              ]),
              endMarker,
            ];
            const imageSection = lines.join("\n");

            const { owner, repo } = context.repo;
            let release;

            try {
              release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tagName,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              release = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tagName,
                name: tagName,
                body: imageSection,
              });
            }

            const currentBody = release.data.body || "";
            const sectionPattern = new RegExp(
              `${startMarker}[\\s\\S]*?${endMarker}`,
              "m"
            );
            const nextBody = sectionPattern.test(currentBody)
              ? currentBody.replace(sectionPattern, imageSection)
              : [currentBody.trim(), imageSection].filter(Boolean).join("\n\n");

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.data.id,
              body: nextBody,
            });

      - name: Write Release Summary
        shell: bash
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          IMAGE_TAGS: ${{ needs.prepare.outputs.release_notes_tags }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          {
            echo "## Release Updated"
            echo
            echo "- Release tag: \`${REF_NAME}\`"
            echo "- Registry: \`${IMAGE}\`"
            echo
            echo "### Release Tags"
            printf '%s\n' "$IMAGE_TAGS" | sed "s#^#- \`${IMAGE}:#" | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"
